title: "Zainul's Tech Blog"
tagline: "Observations on tech in the wild"
email: hello@zainul.me
description: >- 
  Real-life tech observations. I spot things in the wild — badly designed
  interfaces, clever implementations, and systems that work better — then
  expand on them here.
url: "https://blog.zainul.me"
github_username: zainul1996
author: "Zainul"

# Theme
theme: minima

header_pages:
  - about.md

# Build settings
markdown: kramdown
permalink: /:year/:month/:title/

# Show excerpts on the home page
show_excerpts: true

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Social
twitter:
  username: zainulcain
  card: summary_large_image
logo: /assets/images/bus-stop-display.jpg